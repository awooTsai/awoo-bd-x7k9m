<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蔡阿達 — 個人會議戰情室</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--y:#FFD600;--m:#FF2D7B;--c:#00E5FF;--b:#304FFE;--o:#FF6D00;--g:#00E676;--k:#1A1A2E;--w:#FFFDE7;--r:#FF1744;--p:#AA00FF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans TC',sans-serif;font-size:16px;line-height:1.7;background:var(--w);color:var(--k);background-image:radial-gradient(circle,#ddd 2px,transparent 2px);background-size:18px 18px}

.hd{background:var(--k);color:var(--y);padding:20px 24px;border-bottom:6px solid var(--m)}
.hd h1{font-family:'Fredoka','Noto Sans TC',sans-serif;font-weight:700;font-size:clamp(22px,5vw,40px);letter-spacing:2px;text-shadow:3px 3px 0 var(--m),-1px -1px 0 var(--c)}
.hd .sub{font-size:16px;color:var(--c);font-weight:700;margin-top:4px}
.hd .badge{display:inline-block;background:var(--m);color:#fff;padding:3px 14px;border-radius:16px;font-weight:900;font-size:16px;margin-top:6px}

.sb{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));border-bottom:4px solid var(--k)}
.sc{padding:12px 16px;text-align:center;border-right:3px solid var(--k);border-bottom:3px solid var(--k)}
.sc:nth-child(1){background:var(--y)}.sc:nth-child(2){background:var(--c)}.sc:nth-child(3){background:var(--m);color:#fff}.sc:nth-child(4){background:var(--g)}.sc:nth-child(5){background:var(--o);color:#fff}.sc:nth-child(6){background:var(--b);color:#fff}
.sn{font-family:'JetBrains Mono';font-size:36px;line-height:1;font-weight:700}
.sl{font-size:16px;font-weight:900;letter-spacing:1px;margin-top:2px}

.tc{padding:0 12px}
.tn{display:flex;gap:0;margin-top:16px;border-bottom:4px solid var(--k);flex-wrap:wrap}
.tb{flex:1;min-width:100px;padding:12px 6px;border:3px solid var(--k);border-bottom:none;font-family:'Inter','Noto Sans TC',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;letter-spacing:1px;cursor:pointer;text-align:center;background:#eee;color:var(--k);position:relative;top:4px;border-radius:10px 10px 0 0;transition:all .12s}
.tb:hover{transform:translateY(-2px)}.tb.on{top:0;border-bottom:4px solid var(--w);z-index:2;background:var(--k);color:var(--y)}
.tp{display:none;padding:16px 0 40px}.tp.on{display:block}
.st{font-family:'Inter','Noto Sans TC',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px;padding:6px 14px;margin:16px 0 10px;border-left:6px solid;display:flex;align-items:center;gap:8px}

details.cc{border:3px solid var(--k);border-radius:10px;overflow:hidden;background:#fff;transition:transform .12s,box-shadow .12s;margin-bottom:12px}
details.cc:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--k)}
details.cc>summary{padding:12px 16px;font-weight:900;font-size:17px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;list-style:none;border-bottom:2px solid transparent}
details.cc>summary::-webkit-details-marker{display:none}
details.cc[open]>summary{border-bottom-color:var(--k);background:#fafafa}
.tag{font-size:14px;padding:3px 10px;border-radius:8px;font-weight:700;margin-left:6px}
.tag-partner{background:#E8EAF6;color:var(--b)}
.tag-internal{background:#E0F7FA;color:#00838F}
.tag-client{background:#FFF3E0;color:var(--o)}
.tag-company{background:#FCE4EC;color:var(--m)}
.tag-bni{background:#FFEBEE;color:#D32F2F}
.tag-tools{background:#F3E5F5;color:#6A1B9A}
.tag-events{background:#E0F2F1;color:#00695C}
.cd{font-family:'JetBrains Mono';font-size:13px;background:var(--k);color:#fff;padding:1px 7px;border-radius:6px;margin-left:6px}
.right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.arrow{transition:transform .2s;font-size:14px;color:#999;margin-left:6px}
details.cc[open]>summary .arrow{transform:rotate(180deg)}
.updated-badge{font-size:13px;color:#999;font-weight:500;margin-left:8px}

.cb{padding:14px 16px;font-size:16px;line-height:1.7}
.one-liner{font-weight:900;font-size:17px;color:var(--k);margin-bottom:8px;padding:4px 0;border-bottom:2px dashed #eee}
.key-points{margin:0;padding-left:18px}.key-points li{margin-bottom:5px;font-size:16px}
.nums{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.num-chip{background:#f5f5f5;border:2px solid #eee;border-radius:8px;padding:3px 12px;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.source-tag{display:inline-block;font-size:13px;padding:2px 8px;border-radius:6px;background:#f0f0f0;color:#666;margin-right:4px;margin-bottom:4px}
.actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.actions a,.actions button{font-size:14px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:pointer;text-decoration:none;border:2px solid var(--k);transition:all .1s;font-family:inherit}
.btn-detail{background:var(--y);color:var(--k)}.btn-detail:hover{background:var(--o);color:#fff}
.btn-doc{background:#fff;color:var(--b)}.btn-doc:hover{background:var(--b);color:#fff}
.todo-list{margin-top:12px;padding:10px 14px;background:#FFFDE7;border-left:4px solid var(--y);border-radius:0 8px 8px 0}
.todo-list h5{font-size:14px;color:var(--o);margin-bottom:6px;font-weight:900}
.todo-list li{color:#555;margin-bottom:3px;font-size:16px}

.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,26,46,.7);z-index:100;overflow-y:auto;padding:24px}
.modal-bg.show{display:flex;justify-content:center;align-items:flex-start}
.modal{background:#fff;border:4px solid var(--k);border-radius:16px;max-width:800px;width:100%;margin:20px auto;overflow:hidden;animation:popIn .2s ease-out}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.mh{padding:16px 20px;font-size:18px;font-weight:900;display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid var(--k);background:var(--k);color:var(--y)}
.mh .close{width:36px;height:36px;border-radius:50%;border:3px solid var(--y);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:900;background:transparent;color:var(--y);transition:all .1s}
.mh .close:hover{background:var(--r);border-color:var(--r);color:#fff}
.mb{padding:20px;max-height:70vh;overflow-y:auto}
.mb .meta{font-size:14px;color:#888;margin-bottom:12px;padding:10px 14px;background:#f9f9f9;border-radius:8px}
.mb h3{font-size:17px;font-weight:900;margin:16px 0 8px;padding:4px 12px;border-left:4px solid var(--b);display:inline-block;border-radius:0 8px 8px 0;background:#E8EAF6}
.mb .date-divider{font-size:16px;font-weight:900;padding:10px 14px;margin:16px 0 8px;background:var(--k);color:var(--y);border-radius:8px}
.dlg-line{padding:10px 14px;margin-bottom:8px;border-radius:8px;font-size:16px;line-height:1.7}
.dlg-ada{background:#E8EAF6;border-left:4px solid var(--b)}
.dlg-other{background:#FFF3E0;border-left:4px solid var(--o)}
.dlg-line .speaker{font-weight:900;font-size:14px;margin-bottom:3px}
.dlg-ada .speaker{color:var(--b)}
.dlg-other .speaker{color:var(--o)}
details.dialogue{margin:8px 0;border:2px solid #eee;border-radius:10px;overflow:hidden}
details.dialogue>summary{padding:10px 14px;background:#f5f5f5;font-weight:900;font-size:16px;cursor:pointer;list-style:none}
details.dialogue>summary::-webkit-details-marker{display:none}
.dlg-content{padding:14px}

.todo-card{border:3px solid var(--k);border-radius:10px;padding:16px;margin-bottom:12px;background:#fff}
.todo-card h4{font-size:17px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.todo-items{padding-left:0;list-style:none}
.todo-items li{padding:8px 12px;margin-bottom:4px;border-radius:8px;font-size:16px;display:flex;align-items:flex-start;gap:8px;background:#f9f9f9}
.todo-items li::before{content:'☐';font-size:18px;flex-shrink:0;color:var(--o)}
.todo-owner{font-size:13px;padding:2px 8px;border-radius:6px;background:var(--k);color:var(--y);font-weight:700;white-space:nowrap}

.ft{text-align:center;padding:20px;background:var(--k);color:#888;font-size:14px;margin-top:40px;border-top:6px solid var(--m)}
@media(max-width:640px){.tb{font-size:13px!important;padding:8px 2px;letter-spacing:0}.sb{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div class="hd">
  <h1>⚡ 蔡阿達 — 個人會議戰情室</h1>
  <div class="sub">awoo 業務開發部資深總監 ｜ 以專案為單位 ｜ 點擊卡片展開詳情，「看對話」查看完整討論</div>
  <span class="badge" id="header-badge"></span>
</div>

<div class="sb" id="stats-bar"></div>

<div class="tc">
<div class="tn" id="tab-bar"></div>
<div id="tab-panels"></div>
</div>

<div id="modals-container"></div>

<!-- ✂️ awoo × 蔡阿達 通用簽名檔（黑底版）-->
<div class="ft" id="footer-info"></div>
<div style="
    background-color: #1A1A2E;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
    color: #888;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    border-top: 1px solid #333;
">
    <span style="color: #888; font-weight: 400;">Powered by</span>
    <a href="https://awoo.ai" target="_blank" style="display: flex; align-items: center; text-decoration: none;">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczMZZWr30_dY1Ke-Bi8Y5xkmHCR6LbpulIszDS4CBY-83hv8qlFlMUYq0BIpRHWnb-ECK73QEhMme3wZrk8MBJFjJ2AYBa13o6MtY0i6yliFbayXMCTZZ5f0kLXkpqh1nv0HMPKvDTGyUN8a_OQhNpkh6A=w451-h159-s-no-gm?authuser=0"
             alt="awoo 阿物科技官網"
             style="height: 24px; width: auto; vertical-align: middle;">
    </a>
    <span style="color: #555;">|</span>
    <a href="https://www.triplew.tw/tsai"
       target="_blank"
       data-text="蔡阿達"
       style="
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #c8f5ff;
            text-decoration: none;
            letter-spacing: 1px;
            padding: 5px 5px 3px 5px;
            border-bottom: 2px solid rgba(0, 255, 255, 0.4);
            transition: color 0.3s ease, text-shadow 0.3s ease, border-color 0.3s ease;
            display: inline-block;
            cursor: pointer;
       "
       onmouseover="
            this.style.color = '#ffffff';
            this.style.textShadow = '0 0 8px rgba(0, 255, 255, 0.9), 0 0 20px rgba(0, 255, 255, 0.7)';
            this.style.borderBottomColor = 'rgba(0, 255, 255, 0.9)';
            if (!this.glitchInterval) {
                var originalText = this.getAttribute('data-text');
                var chars = '█▓▒░_';
                var el = this;
                this.glitchInterval = setInterval(function() {
                    var scrambled = '';
                    for (var i = 0; i < originalText.length; i++) {
                        if (Math.random() > 0.9) {
                            scrambled += chars[Math.floor(Math.random() * chars.length)];
                        } else {
                            scrambled += originalText[i];
                        }
                    }
                    el.innerText = scrambled;
                }, 80);
            }
       "
       onmouseout="
            clearInterval(this.glitchInterval);
            this.glitchInterval = null;
            this.innerText = this.getAttribute('data-text');
            this.style.color = '#c8f5ff';
            this.style.textShadow = 'none';
            this.style.borderBottomColor = 'rgba(0, 255, 255, 0.4)';
       "
    >
        蔡阿達
    </a>
    <span style="color: #888; letter-spacing: 0.5px;">
        Crafted with Precision and Innovation
    </span>
</div>

<script src="data.js"></script>
<script>
(function(){
  var D = window.WAR_ROOM_DATA;
  if(!D){document.body.innerHTML='<h1 style="padding:40px;color:red">data.js 載入失敗</h1>';return}

  var catMeta = {
    partner: {label:'第三方合作',icon:'🤝',tagClass:'tag-partner',color:'var(--b)',bg:'#E8EAF6'},
    internal: {label:'部門推進',icon:'★',tagClass:'tag-internal',color:'#00838F',bg:'#E0F7FA'},
    client: {label:'客戶洽談',icon:'💼',tagClass:'tag-client',color:'var(--o)',bg:'#FFF3E0'},
    company: {label:'公司策略',icon:'🌟',tagClass:'tag-company',color:'var(--m)',bg:'#FCE4EC'},
    bni: {label:'BNI 富真分會',icon:'🔗',tagClass:'tag-bni',color:'#D32F2F',bg:'#FFEBEE'},
    tools: {label:'工具研發',icon:'🛠️',tagClass:'tag-tools',color:'#6A1B9A',bg:'#F3E5F5'},
    events: {label:'外部活動',icon:'📣',tagClass:'tag-events',color:'#00695C',bg:'#E0F2F1'}
  };

  // Sort projects by lastUpdated desc
  D.projects.sort(function(a,b){return b.lastUpdated.localeCompare(a.lastUpdated)});

  // Count todos
  var todosByPriority = {today:[],week:[],waiting:[]};
  D.projects.forEach(function(p){
    p.todos.forEach(function(t){
      t._project = p.name;
      t._icon = p.icon;
      (todosByPriority[t.priority]||todosByPriority.week).push(t);
    });
  });

  // Header badge
  document.getElementById('header-badge').textContent =
    '📅 ' + D.dateLabel + ' ｜ ' + D.stats.meetings + ' 場會議 ｜ ' +
    D.stats.projects + ' 個專案 ｜ 每日 19:00 自動更新';

  // Stats bar
  var statsHTML = '';
  var statItems = [
    {n:D.stats.meetings, l:'今日會議'},
    {n:D.stats.projects, l:'進行中專案'},
    {n:D.stats.partners, l:'第三方合作'},
    {n:D.stats.internal, l:'部門推進'},
    {n:D.stats.clientCompany, l:'客戶/公司'},
    {n:todosByPriority.today.length+todosByPriority.week.length+todosByPriority.waiting.length, l:'待辦事項'}
  ];
  statItems.forEach(function(s){
    statsHTML += '<div class="sc"><div class="sn">'+s.n+'</div><div class="sl">'+s.l+'</div></div>';
  });
  document.getElementById('stats-bar').innerHTML = statsHTML;

  // Count by category
  var catCount = {};
  D.projects.forEach(function(p){catCount[p.category]=(catCount[p.category]||0)+1});

  // Tabs — 動態生成，只顯示有專案的分類
  var tabs = [{id:'all',label:'⚡ 全部專案 ('+D.projects.length+')'}];
  Object.keys(catMeta).forEach(function(cat){
    if(catCount[cat]){
      tabs.push({id:cat,label:catMeta[cat].icon+' '+catMeta[cat].label+' ('+(catCount[cat]||0)+')'});
    }
  });
  tabs.push({id:'todo',label:'📋 待辦總覽'});
  var tabBarHTML = '';
  tabs.forEach(function(t,i){
    tabBarHTML += '<button class="tb'+(i===0?' on':'')+'" data-tab="'+t.id+'">'+t.label+'</button>';
  });
  document.getElementById('tab-bar').innerHTML = tabBarHTML;

  // === Render project card HTML ===
  function renderCard(p){
    var cm = catMeta[p.category]||catMeta.client;
    var lastMeeting = p.meetingHistory[0];
    var html = '<details class="cc">';
    html += '<summary style="background:'+cm.bg+'">';
    html += '<span>'+p.icon+' '+p.name+'</span>';
    html += '<span class="right">';
    html += '<span class="tag '+cm.tagClass+'">'+cm.label+'</span>';
    if(lastMeeting) html += '<span class="cd">'+lastMeeting.time+'</span>';
    html += '<span class="updated-badge">更新 '+p.lastUpdated+'</span>';
    html += '<span class="arrow">▼</span>';
    html += '</span></summary>';

    html += '<div class="cb">';
    html += '<div class="one-liner">'+p.summary+'</div>';

    // Source tags
    p.meetingHistory.forEach(function(m){
      html += '<span class="source-tag">📅 '+m.date+' '+m.title+'</span>';
    });

    // Key points
    html += '<ul class="key-points">';
    p.keyPoints.forEach(function(kp){html += '<li>'+kp+'</li>'});
    html += '</ul>';

    // Chips
    if(p.chips.length){
      html += '<div class="nums">';
      p.chips.forEach(function(c){html += '<span class="num-chip">'+c.icon+' '+c.text+'</span>'});
      html += '</div>';
    }

    // Todos
    if(p.todos.length){
      html += '<div class="todo-list"><h5>🎯 待辦追蹤</h5><ul>';
      p.todos.forEach(function(t){html += '<li>'+t.text+(t.owner!=='蔡阿達'?' <em style="color:#999">('+t.owner+')</em>':'')+'</li>'});
      html += '</ul></div>';
    }

    // Action buttons
    html += '<div class="actions">';
    html += '<button class="btn-detail" onclick="openModal(\'modal-'+p.id+'\')">💬 看對話細節</button>';
    if(lastMeeting && lastMeeting.docUrl){
      html += '<a class="btn-doc" href="'+lastMeeting.docUrl+'" target="_blank">📄 原始記錄</a>';
    }
    html += '</div>';

    html += '</div></details>';
    return html;
  }

  // === Render modal HTML ===
  function renderModal(p){
    var cm = catMeta[p.category]||catMeta.client;
    var html = '<div class="modal-bg" id="modal-'+p.id+'">';
    html += '<div class="modal">';
    html += '<div class="mh"><span>'+p.icon+' '+p.name+' — 對話細節</span>';
    html += '<div class="close" onclick="closeModal(\'modal-'+p.id+'\')">✕</div></div>';
    html += '<div class="mb">';

    p.meetingHistory.forEach(function(m,mi){
      html += '<div class="date-divider">📅 '+m.date+' — '+m.title+' ('+m.time+', '+m.duration+')</div>';
      html += '<div class="meta">👥 '+m.participants;
      if(m.docUrl) html += ' ｜ <a href="'+m.docUrl+'" target="_blank">📄 原始記錄</a>';
      html += '</div>';

      m.dialogues.forEach(function(d){
        var openAttr = (mi===0) ? ' open' : '';
        html += '<details class="dialogue"'+openAttr+'>';
        html += '<summary>💡 '+d.topic+'</summary>';
        html += '<div class="dlg-content">';
        d.exchanges.forEach(function(e){
          var cls = e.role==='ada' ? 'dlg-ada' : 'dlg-other';
          var label = e.role==='ada' ? '蔡阿達' : e.speaker+(e.label?' ('+e.label+')':'');
          html += '<div class="dlg-line '+cls+'"><div class="speaker">'+label+'</div>'+e.text+'</div>';
        });
        html += '</div></details>';
      });
    });

    html += '</div></div></div>';
    return html;
  }

  // === Build panels ===
  var panelsHTML = '';
  var modalsHTML = '';

  // All projects tab
  panelsHTML += '<div id="t-all" class="tp on">';
  panelsHTML += '<div class="st" style="border-color:var(--y);color:var(--k)">⚡ '+D.dateLabel+' — 所有進行中專案（按更新日期排序）</div>';
  D.projects.forEach(function(p){panelsHTML += renderCard(p)});
  panelsHTML += '</div>';

  // Category tabs — 動態生成所有有專案的分類
  Object.keys(catMeta).forEach(function(cat){
    if(!catCount[cat]) return;
    var cm = catMeta[cat];
    var filtered = D.projects.filter(function(p){return p.category===cat});
    panelsHTML += '<div id="t-'+cat+'" class="tp">';
    panelsHTML += '<div class="st" style="border-color:'+cm.color+';color:'+cm.color+'">'+cm.icon+' '+cm.label+' — '+filtered.length+' 個專案</div>';
    filtered.forEach(function(p){panelsHTML += renderCard(p)});
    panelsHTML += '</div>';
  });

  // Todo tab
  panelsHTML += '<div id="t-todo" class="tp">';
  panelsHTML += '<div class="st" style="border-color:var(--r);color:var(--r)">📋 待辦總覽 — 所有會議產出的 Action Items</div>';

  if(todosByPriority.today.length){
    panelsHTML += '<div class="todo-card" style="border-color:var(--r)"><h4>🔴 今日 / 明日必須處理</h4><ul class="todo-items">';
    todosByPriority.today.forEach(function(t){
      panelsHTML += '<li><span class="todo-owner">'+t.owner+'</span> '+t.text+'</li>';
    });
    panelsHTML += '</ul></div>';
  }
  if(todosByPriority.week.length){
    panelsHTML += '<div class="todo-card" style="border-color:var(--o)"><h4>🟠 本週待處理</h4><ul class="todo-items">';
    todosByPriority.week.forEach(function(t){
      panelsHTML += '<li><span class="todo-owner">'+t.owner+'</span> '+t.text+'</li>';
    });
    panelsHTML += '</ul></div>';
  }
  if(todosByPriority.waiting.length){
    panelsHTML += '<div class="todo-card" style="border-color:var(--b)"><h4>🔵 等待他人</h4><ul class="todo-items">';
    todosByPriority.waiting.forEach(function(t){
      panelsHTML += '<li><span class="todo-owner">'+t.owner+'</span> '+t.text+'</li>';
    });
    panelsHTML += '</ul></div>';
  }
  panelsHTML += '</div>';

  document.getElementById('tab-panels').innerHTML = panelsHTML;

  // Modals
  D.projects.forEach(function(p){modalsHTML += renderModal(p)});
  document.getElementById('modals-container').innerHTML = modalsHTML;

  // Footer
  document.getElementById('footer-info').innerHTML =
    '最後更新：'+D.lastUpdated+' ｜ 資料來源：Google Drive SeaMeet ｜ 每日 19:00 自動更新';

  // === Tab switching ===
  document.querySelectorAll('.tb').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tab = this.getAttribute('data-tab');
      document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on')});
      document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('on')});
      this.classList.add('on');
      document.getElementById('t-'+tab).classList.add('on');
    });
  });

  // === Modal ===
  window.openModal = function(id){
    if(event) event.stopPropagation();
    document.getElementById(id).classList.add('show');
    document.body.style.overflow='hidden';
  };
  window.closeModal = function(id){
    document.getElementById(id).classList.remove('show');
    document.body.style.overflow='';
  };
  document.querySelectorAll('.modal-bg').forEach(function(m){
    m.addEventListener('click',function(e){
      if(e.target===m){m.classList.remove('show');document.body.style.overflow=''}
    });
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      document.querySelectorAll('.modal-bg.show').forEach(function(m){m.classList.remove('show')});
      document.body.style.overflow='';
    }
  });
})();
</script>
</body>
</html>
